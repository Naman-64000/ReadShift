version: "3.9"

services:
  # ── Infrastructure ────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: readshift_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-readshift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-readshift_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-readshift_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-readshift}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: readshift_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ───────────────────────────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: readshift_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-postgresql://readshift:readshift_dev_password@postgres:5432/readshift_dev}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SUPABASE_URL: ${SUPABASE_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:80}
      ALLOW_DEV_TOKEN: ${ALLOW_DEV_TOKEN:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PASSAGE_POOL_MIN_THRESHOLD: ${PASSAGE_POOL_MIN_THRESHOLD:-50}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001/api}
    container_name: readshift_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

